syntax = "proto3";

package databend_proto;

import "metadata.proto";

// Immutable SQL definition of a materialized view.
// Identity lives on the key (tenant, table_id), not in this value.
message MVDefinition {
  uint64 ver = 100;
  uint64 min_reader_ver = 101;

  // SQL text submitted by the user.
  string original_query = 1;
  // Fully qualified SQL used by Databend.
  string query = 2;
  // Logical schema of the user's defining query, used for the externally
  // visible column types. TableMeta.schema stores the rewritten physical
  // schema that Fuse uses to read and write the materialized data.
  DataSchema schema = 3;
}

// MV table ids that depend on one source table.
// Key is __fd_materialized_view_by_source/<tenant>/<source_table_id>;
// source_table_id is only in the key, not in this value.
message SourceTableMVIds {
  uint64 ver = 100;
  uint64 min_reader_ver = 101;

  repeated uint64 mv_ids = 1;
}
