syntax = "proto3";

package databend_proto;

import "metadata.proto";

// Immutable SQL definition of a materialized view.
// Identity lives on the key (tenant, table_id), not in this value.
message MVDefinition {
  uint64 ver = 100;
  uint64 min_reader_ver = 101;

  // SQL text as submitted by the user, for example: SELECT * FROM t.
  string original_query = 1;

  // SQL text with object names fully qualified by Databend, for example:
  // SELECT * FROM catalog.db.t.
  string query = 2;

  // Columns and types returned when querying the materialized view. For example,
  // if orders.amount is a non-null Float64:
  // SELECT AVG(amount) AS avg_amount FROM orders
  // this logical schema is [avg_amount: Float64]. The materialized-view
  // TableMeta.schema is [avg_amount: Tuple(Float64, UInt64)]. The Fuse table
  // stores this mergeable AVG state (sum and count), which is finalized as
  // avg_amount when queried.
  DataSchema logical_schema = 3;

  // Whether source-table writes maintain the MV synchronously.
  // CREATE MATERIALIZED VIEW explicitly sets this to true; CREATE ASYNC
  // MATERIALIZED VIEW sets it to false and scheduled tasks refresh the MV.
  // This mode is immutable after publication; recreate the MV to change it.
  bool sync_creation = 4;
}
